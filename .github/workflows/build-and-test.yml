name: Build & Test VeilVault

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ANCHOR_VERSION: "0.29.0"
  SOLANA_VERSION: "stable"
  NODE_VERSION: "20"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # Rust 
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: cargo-${{ hashFiles('program/Cargo.toml') }}

      #  Solana CLI 
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Configure Solana for devnet
        run: |
          solana config set --url devnet
          solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json
          echo "Devnet wallet: $(solana address)"

      # Anchor CLI 
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
          anchor --version

      # Node deps
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm install

      # Build
      - name: Build Anchor program
        run: anchor build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veil-vault-program
          path: |
            target/deploy/veil_vault.so
            target/idl/veil_vault.json
            target/types/veil_vault.ts

      # Type-check TypeScript
      - name: TypeScript type-check (lib files)
        run: npx tsc -p tsconfig.json --noEmit || true  # frontend errors expected until React deps installed

      - name: TypeScript type-check (tests)
        run: npx tsc -p tests/tsconfig.json --noEmit

      # Tests
      - name: Start local validator and run tests
        run: |
          solana-test-validator --reset --quiet &
          sleep 5
          anchor test --skip-local-validator 2>&1 | tee test-output.txt
          # Ensure at least some tests passed
          grep -c "passing" test-output.txt

  # Deploy to devnet (manual trigger only) 
  deploy-devnet:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: devnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }} && avm use ${{ env.ANCHOR_VERSION }}

      - name: Restore deployer wallet
        run: |
          mkdir -p ~/.config/solana
          echo "${{ secrets.DEPLOYER_KEYPAIR }}" > ~/.config/solana/id.json

      - name: Build
        run: anchor build

      - name: Deploy to devnet
        run: |
          anchor deploy \
            --provider.cluster devnet \
            --program-keypair program-keypair.json \
            --program-name veil_vault
          echo "Deployed program ID: $(solana address -k program-keypair.json)"
