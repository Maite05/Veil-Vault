name: Build & Test VeilVault

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: veil-vault-dist
          path: dist/

  program:
    name: Anchor program — cargo check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: cargo-${{ hashFiles('program/Cargo.toml') }}

      - name: cargo check (no SBF toolchain needed)
        working-directory: program
        run: cargo check

  # Manual devnet deploy — triggered via workflow_dispatch only
  deploy-devnet:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [frontend, program]
    environment: devnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.29.0 && avm use 0.29.0

      - name: Restore deployer wallet
        run: |
          mkdir -p ~/.config/solana
          echo "${{ secrets.DEPLOYER_KEYPAIR }}" > ~/.config/solana/id.json

      - name: Build & deploy
        run: |
          anchor build
          anchor deploy \
            --provider.cluster devnet \
            --program-keypair program-keypair.json \
            --program-name veil_vault
          echo "Deployed: $(solana address -k program-keypair.json)"
